<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="referrer" content="never">
<link rel="icon" href="/img/favicon.ico">
<title>BTV</title>
<link rel="stylesheet" href="/css/style.css">
</head>
<body>

<video id="player" preload autoplay playsinline></video>

<div class="btv-controls" id="controls">
  <div class="btv-progress" id="progressWrap">
    <div class="btv-progress-bg">
      <div class="btv-progress-fill" id="progressFill"></div>
      <div class="btv-progress-thumb" id="progressThumb"></div>
    </div>
  </div>
  <div class="btv-bar">
    <div class="btv-bar-left">
      <button class="btv-btn" id="btnRandom">🎲</button>
      <button class="btv-btn" id="btnSource">📁</button>
    </div>
    <div class="btv-bar-right">
      <span class="btv-time" id="timeDisplay">00:00 / 00:00</span>
      <button class="btv-btn btv-vol-btn" id="btnVolume">🔊</button>
      <div class="btv-vol-slider-wrap">
        <input type="range" id="volSlider" min="0" max="100" value="100" class="btv-vol-slider">
      </div>
      <button class="btv-btn" id="btnFullscreen">⛶</button>
    </div>
  </div>
</div>

<button class="btv-landscape" id="btnLandscape">↔</button>

<div class="btv-loading" id="loading"><div class="btv-spinner"></div></div>

<div class="btv-panel" id="sourcePanel">
  <div class="btv-panel-title">切换视频源</div>
  <div id="sourceList"></div>
</div>

<div class="btv-toast" id="toast"></div>

<script>
(function(){
var V=document.getElementById('player'),C=document.getElementById('controls'),
L=document.getElementById('loading'),T=document.getElementById('toast'),
P=document.getElementById('progressFill'),Th=document.getElementById('progressThumb'),
PW=document.getElementById('progressWrap'),TD=document.getElementById('timeDisplay'),
VB=document.getElementById('btnVolume'),VS=document.getElementById('volSlider');
var SL=[],Si=-1,H=[],Hi=-1,vol=1,muted=!1;
var isMobile=/Android|iPhone|iPod|iPad|Mobile/i.test(navigator.userAgent);
var hideTimer=null;

function toast(m){T.textContent=m;T.classList.add('show');clearTimeout(T._t);T._t=setTimeout(function(){T.classList.remove('show')},2e3)}
function fmt(s){if(!s||isNaN(s)||s===Infinity)return'00:00';var m=Math.floor(s/60),sec=Math.floor(s%60);return String(m).padStart(2,'0')+':'+String(sec).padStart(2,'0')}
function setVol(v){vol=Math.max(0,Math.min(1,v));V.volume=vol;V.muted=vol===0;VS.value=Math.round(vol*100);VB.textContent=vol===0?'🔇':vol<0.5?'🔉':'🔊'}
function showControls(){C.classList.add('show');clearTimeout(hideTimer);hideTimer=setTimeout(function(){C.classList.remove('show')},3e3)}

V.addEventListener('timeupdate',function(){if(!V.duration)return;var p=(V.currentTime/V.duration)*100;P.style.width=p+'%';Th.style.left=p+'%';TD.textContent=fmt(V.currentTime)+' / '+fmt(V.duration)});
V.addEventListener('click',function(){V.paused?V.play().catch(function(){}):V.pause()});
VS.addEventListener('input',function(){setVol(this.value/100)});
VB.addEventListener('click',function(){muted=!muted;V.muted=muted;VB.textContent=muted?'🔇':vol===0?'🔇':vol<0.5?'🔉':'🔊'});

async function fetchRandom(){var s=Si>=0?SL[Si]:null;var u=s?'/api/random?source='+encodeURIComponent(s):'/api/random';var r=await fetch(u);if(!r.ok)throw new Error('fetch failed');return r.json()}
async function playNext(){L.classList.add('show');for(var i=0;i<3;i++){try{var d=await fetchRandom();V.src='/api/play?token='+encodeURIComponent(d.token);try{await V.play()}catch(e){}L.classList.remove('show');if(Hi<H.length-1)H=H.slice(0,Hi+1);H.push({token:d.token,name:d.name||'未知'});if(H.length>50)H.shift();Hi=H.length-1;return}catch(e){}}L.classList.remove('show');toast('加载失败，重试中…');setTimeout(playNext,2e3)}
function seekDelta(d){if(!V.duration)return;V.currentTime=Math.max(0,Math.min(V.duration,V.currentTime+d))}
function playPrev(){if(Hi>0){Hi--;var a=H[Hi];V.src='/api/play?token='+encodeURIComponent(a.token);V.play().catch(function(){})}}
V.addEventListener('ended',playNext);
V.addEventListener('error',function(){setTimeout(playNext,2e3)});

async function loadSources(){try{var r=await fetch('/api/sources');var d=await r.json();SL=d.sources||[]}catch(e){}renderSourceList()}
function renderSourceList(){var el=document.getElementById('sourceList');var h='<div class="source-item'+(Si===-1?' active':'')+'" data-i="-1">全部源</div>';SL.forEach(function(name,i){h+='<div class="source-item'+(Si===i?' active':'')+'" data-i="'+i+'">'+name+'</div>'});el.innerHTML=h;el.querySelectorAll('.source-item').forEach(function(item){item.addEventListener('click',function(){Si=parseInt(this.dataset.i);renderSourceList();document.getElementById('sourcePanel').classList.remove('show');playNext()})})}
document.getElementById('btnSource').addEventListener('click',function(){document.getElementById('sourcePanel').classList.toggle('show')});
document.getElementById('sourcePanel').addEventListener('click',function(e){if(e.target===this)this.classList.remove('show')});
document.getElementById('btnRandom').addEventListener('click',playNext);
document.getElementById('btnFullscreen').addEventListener('click',function(){document.fullscreenElement?document.exitFullscreen():document.body.requestFullscreen()});
document.getElementById('btnLandscape').addEventListener('click',function(){if(screen.orientation&&screen.orientation.lock){screen.orientation.type.includes('landscape')?screen.orientation.unlock():screen.orientation.lock('landscape').catch(function(){})}});

if(!isMobile){
  document.addEventListener('keydown',function(e){
    switch(e.key){
      case' ':e.preventDefault();V.paused?V.play().catch(function(){}):V.pause();break;
      case'ArrowLeft':seekDelta(-5);break;
      case'ArrowRight':seekDelta(5);break;
      case'ArrowUp':setVol(vol+0.1);break;
      case'ArrowDown':setVol(vol-0.1);break;
      case'v':case'V':muted=!muted;V.muted=muted;VB.textContent=muted?'🔇':vol<0.5?'🔉':'🔊';break;
      case'f':case'F':document.getElementById('btnFullscreen').click();break;
      case's':case'S':document.getElementById('btnSource').click();break;
      case'r':case'R':playNext();break;
    }
  });
  document.addEventListener('wheel',function(e){e.preventDefault();setVol(vol-e.deltaY*0.001)},{passive:!1});
  document.addEventListener('mousemove',function(){showControls()});
  C.addEventListener('mouseenter',function(){clearTimeout(hideTimer)});
  C.addEventListener('mouseleave',function(){hideTimer=setTimeout(function(){C.classList.remove('show')},2e3)});
  PW.addEventListener('click',function(e){if(!V.duration)return;var r=PW.getBoundingClientRect();V.currentTime=((e.clientX-r.left)/r.width)*V.duration});PW.addEventListener('touchstart',function(e){tActive=!0;var t=e.touches[0];tsX=t.clientX},{passive:!1});PW.addEventListener('touchmove',function(e){if(!tActive||!V.duration)return;var t=e.touches[0],dx=t.clientX-tsX;e.preventDefault();V.currentTime=Math.max(0,Math.min(V.duration,V.currentTime+dx/50))},{passive:!1});PW.addEventListener('touchend',function(){tActive=!1});
}

if(isMobile){
  var tsX=0,tsY=0,tsVol=0,tActive=!1,halfW=window.innerWidth/2;
  document.addEventListener('touchstart',function(e){if(e.target.closest('.btv-panel,.btv-btn,.btv-vol-slider-wrap,.btv-progress,#btnLandscape'))return;var t=e.touches[0];tsX=t.clientX;tsY=t.clientY;tsVol=vol;halfW=window.innerWidth/2;tActive=!0},{passive:!1});
  document.addEventListener('touchmove',function(e){if(!tActive)return;var t=e.touches[0],dx=t.clientX-tsX,dy=t.clientY-tsY;if(tsX>halfW){if(Math.abs(dy)>Math.abs(dx)&&Math.abs(dy)>5){e.preventDefault();setVol(tsVol-dy/300)}}else{if(Math.abs(dx)>5){e.preventDefault();V.currentTime=Math.max(0,Math.min(V.duration,V.currentTime+dx/50));tsX=t.clientX}}},{passive:!1});
  document.addEventListener('touchend',function(){tActive=!1});
  V.addEventListener('click',showControls);
}

(async function(){await loadSources();setTimeout(playNext,300)})();
})();
</script>
</body>
</html>
