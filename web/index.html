<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="referrer" content="never">
<link rel="icon" href="/img/favicon.ico">
<title>BTV</title>
<link rel="stylesheet" href="/css/style.css">
</head>
<body>

<div id="wrap">
<video id="player" preload autoplay playsinline></video>

<!-- 常驻顶部信息栏 -->
<div class="btv-topbar" id="topbar">
  <div class="btv-topbar-left" id="videoName">未知</div>
  <div class="btv-topbar-right" id="clockDisplay">00:00</div>
</div>

<div class="btv-controls" id="controls">
  <div class="btv-progress" id="progressWrap">
    <div class="btv-progress-bg">
      <div class="btv-progress-fill" id="progressFill"></div>
      <div class="btv-progress-thumb" id="progressThumb"></div>
    </div>
  </div>
  <div class="btv-bar">
    <div class="btv-bar-left">
      <button class="btv-btn" id="btnRandom">🎲</button>
      <div class="btv-source-name" id="sourceName">全部源</div>
    </div>
    <div class="btv-bar-right">
      <button class="btv-btn" id="btnSpeed">1x</button>
      <span class="btv-time" id="timeDisplay">00:00 / 00:00</span>
      <button class="btv-btn btv-vol-btn" id="btnVolume">🔊</button>
      <div class="btv-vol-slider-wrap">
        <input type="range" id="volSlider" min="0" max="100" value="100" class="btv-vol-slider">
      </div>
      <button class="btv-btn" id="btnFullscreen">⛶</button>
    </div>
  </div>
</div>

<div class="btv-loading" id="loading"><div class="btv-spinner"></div></div>
</div>

<div class="btv-toast" id="toast"></div>

<script>
(function(){
var W=document.getElementById('wrap'),
V=document.getElementById('player'),C=document.getElementById('controls'),
L=document.getElementById('loading'),T=document.getElementById('toast'),
P=document.getElementById('progressFill'),Th=document.getElementById('progressThumb'),
PW=document.getElementById('progressWrap'),TD=document.getElementById('timeDisplay'),
VB=document.getElementById('btnVolume'),VS=document.getElementById('volSlider'),
SN=document.getElementById('sourceName'),SB=document.getElementById('btnSpeed'),
VN=document.getElementById('videoName'),CLK=document.getElementById('clockDisplay'),
TB=document.getElementById('topbar');

var SL=[],Si=-1,H=[],Hi=-1,vol=1,muted=!1;
var isMobile=/Android|iPhone|iPod|iPad|Mobile/i.test(navigator.userAgent);
var controlsVisible=!1,hideTimer=null;
var seekStep=20;
/* 倍速 */
var speeds=[0.5,1,1.5,2,3],speedIdx=1,curSpeed=1;
/* 长按2倍速 */
var longPressTimer=null,longPressSpeed=2,isLongPress=!1,preLongSpeed=1;

function toast(m){T.textContent=m;T.classList.add('show');clearTimeout(T._t);T._t=setTimeout(function(){T.classList.remove('show')},2e3)}
function fmt(s){if(!s||isNaN(s)||s===Infinity)return'00:00';var m=Math.floor(s/60),sec=Math.floor(s%60);return String(m).padStart(2,'0')+':'+String(sec).padStart(2,'0')}
function fmtSpeed(r){return r>=1?r+'x':r+'x'}
function setSpeed(r){curSpeed=Math.max(0.25,Math.min(5,r));V.playbackRate=curSpeed;SB.textContent=fmtSpeed(curSpeed);toast('倍速 '+fmtSpeed(curSpeed))}
function cycleSpeed(){speedIdx=(speedIdx+1)%speeds.length;curSpeed=speeds[speedIdx];V.playbackRate=curSpeed;SB.textContent=fmtSpeed(curSpeed);toast('倍速 '+fmtSpeed(curSpeed))}
function setVol(v){vol=Math.max(0,Math.min(1,v));V.volume=vol;V.muted=vol===0;VS.value=Math.round(vol*100);VB.textContent=vol===0?'🔇':vol<0.5?'🔉':'🔊';toast('音量 '+Math.round(vol*100)+'%')}
function updateSourceName(){if(!SN)return;SN.textContent=Si===0?'全部源':SL[Si-1]||'全部源'}

function updateClock(){
  var d=new Date();
  CLK.textContent=String(d.getHours()).padStart(2,'0')+':'+String(d.getMinutes()).padStart(2,'0');
}
updateClock();
setInterval(updateClock,10000);

function showControls(){
  controlsVisible=!0;
  C.classList.add('show');
  TB.classList.add('show');
  clearTimeout(hideTimer);
  hideTimer=setTimeout(function(){
    if(!V.paused){
      controlsVisible=!1;
      C.classList.remove('show');
      TB.classList.remove('show');
    }
  },5e3);
}
function hideControlsNow(){
  controlsVisible=!1;
  C.classList.remove('show');
  TB.classList.remove('show');
  clearTimeout(hideTimer);
}

/* 全屏管理 — 全屏wrap，换视频src时防退出 */
var wantFS=!1,switchingSrc=!1,pendingNext=null,fsActive=!1;

document.addEventListener('fullscreenchange',onFSChange);
document.addEventListener('webkitfullscreenchange',onFSChange);

function onFSChange(){
  console.log('[FS] fullscreenchange, isFS='+isFullscreen()+', wantFS='+wantFS+', fsActive='+fsActive);
  if(!isFullscreen()){
    fsActive=!1;
    if(wantFS){
      /* Firefox Android可能退出全屏API但用户不想退出
         → 用CSS fallback模拟全屏 + 保持横屏方向 */
      W.classList.add('fs');
      lockOrientation();
      /* 延迟尝试重入Fullscreen API（可能因缺少user activation失败，没关系） */
      setTimeout(function(){
        if(wantFS&&!isFullscreen()){
          var fn=W.requestFullscreen||W.webkitRequestFullscreen;
          if(fn)fn.call(W).then(function(){fsActive=!0}).catch(function(){});
        }
      },100);
    }else{
      W.classList.remove('fs');
      unlockOrientation();
    }
  }else{
    fsActive=!0;
    W.classList.add('fs');
    lockOrientation();
  }
}

function isFullscreen(){return !!(document.fullscreenElement||document.webkitFullscreenElement)}

/* 屏幕方向锁定（Firefox Android全屏时保持横屏） */
function lockOrientation(){
  try{
    var so=screen.orientation||screen.mozOrientation;
    if(so&&so.lock)so.lock('landscape').catch(function(){});
    else if(screen.lockOrientation)screen.lockOrientation('landscape');
    else if(screen.mozLockOrientation)screen.mozLockOrientation('landscape');
  }catch(e){}
}
function unlockOrientation(){
  try{
    var so=screen.orientation||screen.mozOrientation;
    if(so&&so.unlock)so.unlock();
    else if(screen.unlockOrientation)screen.unlockOrientation();
    else if(screen.mozUnlockOrientation)screen.mozUnlockOrientation();
  }catch(e){}
}

function requestFS(){
  wantFS=!0;
  console.log('[FS] requestFS called');
  lockOrientation();
  var el=W;
  var fn=el.requestFullscreen||el.webkitRequestFullscreen;
  if(fn)fn.call(el).then(function(){fsActive=!0;console.log('[FS] requestFS success')}).catch(function(e){console.log('[FS] requestFS FAILED: '+e)});
}

function exitFS(){
  console.log('[FS] exitFS called');
  wantFS=!1;
  (document.exitFullscreen||document.webkitExitFullscreen||function(){}).call(document);
  unlockOrientation();
}

function changeVideoSrc(newSrc){
  switchingSrc=!0;
  V.src=newSrc;
  V.load();
  setTimeout(function(){switchingSrc=!1},3e3);
}

/* 预取下一个视频URL（视频快结束时触发） */
async function prefetchNext(){
  try{
    var s=Si===0?null:SL[Si-1],
        u=s?'/api/random?source='+encodeURIComponent(s):'/api/random';
    var r=await fetch(u);
    if(!r.ok)throw new Error('HTTP '+r.status);
    var d=await r.json();
    pendingNext=d;
  }catch(e){
    pendingNext=null;
  }
}

function reloadCurrent(){
  if(!V.src)return;
  var savedSrc=V.src,savedTime=V.currentTime;
  switchingSrc=!0;
  V.src='';V.load();
  setTimeout(function(){
    V.src=savedSrc;V.load();V.currentTime=savedTime;V.play().catch(function(){});
    setTimeout(function(){switchingSrc=!1},1e3);
  },100);
}

V.addEventListener('timeupdate',function(){
  if(!V.duration)return;
  var p=(V.currentTime/V.duration)*100;
  P.style.width=p+'%';
  Th.style.left=p+'%';
  TD.textContent=fmt(V.currentTime)+' / '+fmt(V.duration);
});

/* 核心交互：单击暂停/显控制栏，双击全屏，长按2倍速 */
var lastTap=0,dblTapTimer=null;

function handleVideoTap(e){
  if(e)e.preventDefault();
  var now=Date.now();

  if(now-lastTap<300){
    clearTimeout(dblTapTimer);
    lastTap=0;
    if(isFullscreen()){
      exitFS();
    }else{
      requestFS();
    }
    return;
  }
  lastTap=now;

  dblTapTimer=setTimeout(function(){
    if(controlsVisible){
      if(V.paused){V.play().catch(function(){})}else{V.pause()}
      if(V.paused){clearTimeout(hideTimer)}
    }else{
      showControls();
    }
  },300);
}

function handleLongPressStart(e){
  if(e)e.preventDefault();
  if(isLongPress)return;
  preLongSpeed=curSpeed;
  longPressTimer=setTimeout(function(){
    isLongPress=!0;
    setSpeed(longPressSpeed);
  },500);
}

function handleLongPressEnd(e){
  clearTimeout(longPressTimer);
  if(isLongPress){
    isLongPress=!1;
    setSpeed(preLongSpeed);
    if(e)e.preventDefault();
  }
}

/* 桌面端长按 = mousedown/mouseup */
V.addEventListener('mousedown',handleLongPressStart);
V.addEventListener('mouseup',handleLongPressEnd);
V.addEventListener('mouseleave',handleLongPressEnd);

/* 移动端长按 = touchstart(>500ms)/touchend */
V.addEventListener('touchstart',function(e){
  if(e.target===V)handleLongPressStart(e);
},{passive:!1});
V.addEventListener('touchend',function(e){
  if(e.target===V){
    if(isLongPress){
      handleLongPressEnd(e);
    }else{
      clearTimeout(longPressTimer);
      handleVideoTap(e);
    }
  }
},{passive:!1});
V.addEventListener('touchmove',function(){
  clearTimeout(longPressTimer);
  isLongPress=!1;
},{passive:!0});

/* 桌面端点击兜底 */
V.addEventListener('click',function(e){
  if(!isMobile)handleVideoTap(e);
});

/* 音量 */
VS.addEventListener('input',function(){setVol(this.value/100)});
VB.addEventListener('click',function(e){
  e.stopPropagation();
  muted=!muted;V.muted=muted;
  VB.textContent=muted?'🔇':vol===0?'🔇':vol<0.5?'🔉':'🔊';
  toast(muted?'已静音':'已取消静音');
});

/* 倍速按钮 */
SB.addEventListener('click',function(e){e.stopPropagation();cycleSpeed()});

V.addEventListener('play',function(){showControls()});
V.addEventListener('pause',function(){
  controlsVisible=!0;
  C.classList.add('show');
  TB.classList.add('show');
  clearTimeout(hideTimer);
});

/* 换视频时保持当前倍速 */
V.addEventListener('loadstart',function(){V.playbackRate=curSpeed});
V.addEventListener('canplay',function(){switchingSrc=!1});

/* 随机视频 */
async function fetchRandom(){
  var s=Si===0?null:SL[Si-1],
      u=s?'/api/random?source='+encodeURIComponent(s):'/api/random';
  var r=await fetch(u);
  if(!r.ok)throw new Error('HTTP '+r.status);
  return r.json();
}

async function playNext(){
  L.classList.add('show');
  for(var i=0;i<5;i++){
    try{
      var d=await fetchRandom();
      setVideoAndPlay('/api/play?token='+encodeURIComponent(d.token));
      L.classList.remove('show');
      if(Hi<H.length-1)H=H.slice(0,Hi+1);
      H.push({token:d.token,name:d.name||'未知'});
      if(H.length>50)H.shift();
      Hi=H.length-1;
      VN.textContent=d.name||'未知';
      updateSourceName();
      pendingNext=null;
      return;
    }catch(e){
      console.log('Retry '+(i+1)+'/5:',e.message);
      if(i<4)await new Promise(function(r){setTimeout(r,500)});
    }
  }
  L.classList.remove('show');
  toast('加载失败，重试中…');
  setTimeout(playNext,2e3);
}

/* 同步设src+play */
function setVideoAndPlay(src){
  V.src=src;
  V.muted=muted;V.volume=vol;
  V.setAttribute('playsinline','');
  V.play().catch(function(){
    V.muted=!0;
    V.play().catch(function(){});
  });
  V.addEventListener('playing',function unmute(){
    V.muted=muted;V.volume=vol;V.removeEventListener('playing',unmute);
  },{once:!0});
}

/* 视频ended：如果有预取URL，同步切换 */
V.addEventListener('ended',function(){
  wantFS=isFullscreen();
  if(pendingNext){
    var d=pendingNext;
    pendingNext=null;
    switchingSrc=!0;
    setVideoAndPlay('/api/play?token='+encodeURIComponent(d.token));
    if(Hi<H.length-1)H=H.slice(0,Hi+1);
    H.push({token:d.token,name:d.name||'未知'});
    if(H.length>50)H.shift();
    Hi=H.length-1;
    VN.textContent=d.name||'未知';
    updateSourceName();
    L.classList.remove('show');
  }else{
    /* 无预取URL，走async路径 */
    switchingSrc=!0;
    playNext();
  }
});

/* 预取：视频播放到90%时fetch下一个 */
V.addEventListener('timeupdate',function(){
  if(!V.duration||pendingNext)return;
  if(V.currentTime>0&&!pendingNext&&V.currentTime>V.duration*0.9){
    prefetchNext();
  }
});

/* 卡顿检测 */
var stallTimer=null;
function clearStallTimer(){clearTimeout(stallTimer);stallTimer=null}
function startStallTimer(){
  clearStallTimer();
  stallTimer=setTimeout(function(){
    if(V.paused||V.ended||!V.src||V.readyState>=3)return;
    toast('视频卡顿，重新加载…');reloadCurrent();
  },8e3);
}
V.addEventListener('waiting',startStallTimer);
V.addEventListener('playing',clearStallTimer);
V.addEventListener('canplay',clearStallTimer);
V.addEventListener('timeupdate',function(){if(stallTimer&&V.readyState>=2)clearStallTimer()});

V.addEventListener('error',function(){L.classList.remove('show');toast('视频加载失败，换下一个…');setTimeout(playNext,1500)});
V.addEventListener('loadeddata',function(){switchingSrc=!1;L.classList.remove('show')});

/* 黑屏检测 */
var blackCheckTimer=null,blackRetryAttempted=!1;
function startBlackCheck(){clearTimeout(blackCheckTimer);blackCheckTimer=setTimeout(function(){
  if(V.readyState>=2 && V.videoWidth===0 && !V.paused){
    if(!blackRetryAttempted){
      blackRetryAttempted=!0;
      toast("检测到黑屏，尝试转码重播…");
      V.pause();
      var curSrc=V.src,curTime=V.currentTime;
      var sep=curSrc.indexOf("?")>=0?"&":"?";
      changeVideoSrc(curSrc+sep+"transcode=1");
      V.currentTime=curTime;
      V.play().catch(function(){});
      V.addEventListener("playing",function onPlay(){
        V.removeEventListener("playing",onPlay);
        if(V.videoWidth>0){
          toast("转码播放成功 ✅");
        }else{
          toast("转码仍失败，换下一个…");
          setTimeout(playNext,500);
        }
      },{once:!0});
    }else{
      toast("视频无法解码，自动跳过…");V.pause();setTimeout(playNext,500);
    }
  }
},3e3);}
V.addEventListener("playing",startBlackCheck);
V.addEventListener("loadstart",function(){blackRetryAttempted=!1});

async function loadSources(){try{var r=await fetch('/api/sources');var d=await r.json();SL=d.sources||[]}catch(e){console.log('Load sources error:',e)}updateSourceName()}

function cycleSource(){
  if(!SL.length){toast('无可用源');return}
  var total=SL.length+1;
  Si=(Si+1)%total;
  updateSourceName();
  toast(SN.textContent);
}

document.getElementById('btnRandom').addEventListener('click',function(e){
  e.stopPropagation();
  playNext();
});

SN.addEventListener('click',function(e){e.stopPropagation();cycleSource()});

document.getElementById('btnFullscreen').addEventListener('click',function(e){
  e.stopPropagation();
  if(isFullscreen()){
    exitFS();
  }else{
    requestFS();
  }
});

/* 桌面端 */
if(!isMobile){
  document.addEventListener('keydown',function(e){
    switch(e.key){
      case' ':e.preventDefault();if(V.paused){V.play().catch(function(){})}else{V.pause()}break;
      case'ArrowLeft':seekDelta(-seekStep);break;
      case'ArrowRight':seekDelta(seekStep);break;
      case'ArrowUp':setVol(vol+0.1);break;
      case'ArrowDown':setVol(vol-0.1);break;
      case'v':case'V':muted=!muted;V.muted=muted;VB.textContent=muted?'🔇':vol<0.5?'🔉':'🔊';toast(muted?'已静音':'已取消静音');break;
      case'f':case'F':if(isFullscreen()){exitFS()}else{requestFS()}break;
      case'd':case'D':cycleSpeed();break;
      case's':case'S':cycleSource();break;
      case'r':case'R':playNext();break;
    }
  });
  document.addEventListener('wheel',function(e){e.preventDefault();setVol(vol-e.deltaY*0.001)},{passive:!1});
  document.addEventListener('mousemove',function(){showControls()});
  C.addEventListener('mouseenter',function(){clearTimeout(hideTimer)});
  C.addEventListener('mouseleave',function(){hideTimer=setTimeout(function(){if(!V.paused){C.classList.remove('show');TB.classList.remove('show');controlsVisible=!1}},5e3)});

  PW.addEventListener('click',function(e){
    e.stopPropagation();
    if(!V.duration)return;
    var r=PW.getBoundingClientRect();
    V.currentTime=((e.clientX-r.left)/r.width)*V.duration;
    toast('进度 '+fmt(V.currentTime)+' / '+fmt(V.duration));
  });

  var progressDragging=!1;
  PW.addEventListener('mousedown',function(e){e.preventDefault();progressDragging=!0;var r=PW.getBoundingClientRect();V.currentTime=Math.max(0,Math.min(V.duration,((e.clientX-r.left)/r.width)*V.duration))});
  document.addEventListener('mousemove',function(e){if(progressDragging&&V.duration){var r=PW.getBoundingClientRect();V.currentTime=Math.max(0,Math.min(V.duration,((e.clientX-r.left)/r.width)*V.duration))}});
  document.addEventListener('mouseup',function(){progressDragging=!1});
}

/* 移动端 */
if(isMobile){
  var tsX=0,tsY=0,tsVol=0,tActive=!1,halfW=0;

  document.addEventListener('touchstart',function(e){
    if(e.target.closest('.btv-btn,.btv-source-name,.btv-vol-slider-wrap,.btv-progress,.btv-controls')){
      return;
    }
    var t=e.touches[0];
    tsX=t.clientX;tsY=t.clientY;tsVol=vol;
    halfW=window.innerWidth/2;tActive=!0;
  },{passive:!0});

  document.addEventListener('touchmove',function(e){
    if(!tActive)return;
    var t=e.touches[0],dx=t.clientX-tsX,dy=t.clientY-tsY;

    if(tsX>halfW){
      if(Math.abs(dy)>Math.abs(dx)&&Math.abs(dy)>5){
        e.preventDefault();
        setVol(tsVol-dy/300);
      }
    }else{
      if(Math.abs(dx)>5){
        e.preventDefault();
        var step=dx>0?seekStep:-seekStep;
        V.currentTime=Math.max(0,Math.min(V.duration||0,V.currentTime+step));
        tsX=t.clientX;
      }
    }
  },{passive:!1});

  document.addEventListener('touchend',function(){tActive=!1},{passive:!0});

  /* 进度条触摸（移动端） */
  PW.addEventListener('touchstart',function(e){
    e.stopPropagation();
    var t=e.touches[0],r=PW.getBoundingClientRect();
    if(V.duration)V.currentTime=Math.max(0,Math.min(V.duration,((t.clientX-r.left)/r.width)*V.duration));
  },{passive:!1});
  PW.addEventListener('touchmove',function(e){
    e.preventDefault();e.stopPropagation();
    var t=e.touches[0],r=PW.getBoundingClientRect();
    if(V.duration)V.currentTime=Math.max(0,Math.min(V.duration,((t.clientX-r.left)/r.width)*V.duration));
  },{passive:!1});
  PW.addEventListener('touchend',function(e){e.stopPropagation()},{passive:!1});
}

(async function(){await loadSources();setTimeout(playNext,300)})();
})();
</script>
</body>
</html>
